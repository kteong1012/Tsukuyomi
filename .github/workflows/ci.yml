name: Tsukuyomi CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  policy-and-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate Config
        run: python Tools/dev.py validate-config

      - name: Validate Codegen Consistency
        run: python Tools/dev.py generate-config --check

      - name: Guard Architecture Rules
        run: python Tools/dev.py guard-architecture

  unity-tests:
    if: ${{ secrets.UNITY_LICENSE != '' }}
    runs-on: ubuntu-latest
    needs:
      - policy-and-config
    strategy:
      fail-fast: false
      matrix:
        testMode:
          - editmode
          - playmode
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unity Test Runner
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.0.62f1
          testMode: ${{ matrix.testMode }}
          artifactsPath: TestResults

  smoke-ui:
    if: ${{ secrets.UNITY_LICENSE != '' }}
    runs-on: ubuntu-latest
    needs:
      - unity-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Smoke UI PlayMode Filter
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.0.62f1
          testMode: playmode
          customParameters: -testFilter Tsukuyomi.Tests.PlayMode.SmokeUiFlowTests
